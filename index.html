<head>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#07130e,#0f172a);
  color:white;
}
.container{max-width:1100px;margin:auto;padding:22px}
.hero{
  background:#102016;
  padding:28px;
  border-radius:24px;
  margin-bottom:18px;
  border:1px solid #244b35;
}
h1{font-size:42px;margin:0;color:#4ade80}
p{color:#b6c4bd;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1.3fr;gap:18px}
.card{
  background:#1e293b;
  border:1px solid #334155;
  border-radius:20px;
  padding:20px;
}
label{display:block;margin-top:14px;font-weight:bold}
select,input,button{
  width:100%;
  padding:13px;
  margin-top:8px;
  border-radius:12px;
  border:1px solid #475569;
  font-size:15px;
}
select,input{background:#0f172a;color:white}
button{
  background:#22c55e;
  color:#062014;
  font-weight:bold;
  cursor:pointer;
  border:none;
}
button:hover{background:#4ade80}
.resultBox{
  background:#0f172a;
  border-radius:18px;
  padding:18px;
  margin-top:14px;
  border:1px solid #334155;
}
.badge{
  display:inline-block;
  padding:7px 10px;
  border-radius:999px;
  background:#dcfce7;
  color:#14532d;
  font-weight:bold;
  margin-bottom:10px;
}
.actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
.action{
  padding:14px;
  border-radius:14px;
  background:#334155;
}
.action b{display:block;margin-bottom:6px}
a{
  display:block;
  text-align:center;
  text-decoration:none;
  color:white;
  background:#2563eb;
  padding:12px;
  border-radius:12px;
  font-weight:bold;
  margin-top:10px;
}
.modelCount{
  margin-top:10px;
  color:#94a3b8;
  font-size:13px;
}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
  h1{font-size:32px}
  .actions{grid-template-columns:1fr}
}
</style>
</head>

<div class="hero">
  <h1>Ne Yapayım?</h1>
  <p>Elindeki teknolojik ürünü seç. Satmalı mısın, tamir mi ettirmelisin, bağışlamalı mısın yoksa geri dönüşüme mi vermelisin? Tek ekranda gör.</p>
</div>

<div class="grid">

<div class="card">
  <h2>Ürün Bilgisi</h2>

  <label>Ürün türü</label>
  <select id="category" onchange="updateBrands()">
    <option value="phone">Telefon</option>
    <option value="tablet">Tablet / iPad</option>
    <option value="tv">Televizyon</option>
    <option value="laptop">Laptop</option>
  </select>

  <label>Marka</label>
  <select id="brand" onchange="updateModels()"></select>

  <label>Model ara</label>
  <input id="search" placeholder="Örn: iPhone 13, Galaxy S24, The Frame" oninput="updateModels()">

  <label>Model</label>
  <select id="model"></select>

  <label>Durum</label>
  <select id="condition">
    <option value="new">Yeni gibi</option>
    <option value="good">Çalışıyor / iyi durumda</option>
    <option value="minor">Küçük hasarlı</option>
    <option value="broken">Çalışmıyor / ciddi hasarlı</option>
  </select>

  <label>Şehir / ilçe</label>
  <input id="city" value="Kadıköy, İstanbul">

  <button onclick="analyze()">Ne Yapmalıyım?</button>
  <div class="modelCount" id="count"></div>
</div>

<div class="card">
  <h2>Öneriler</h2>
  <div id="result" class="resultBox">
    Ürün seçip “Ne Yapmalıyım?” butonuna bas.
  </div>
</div>

</div>
</div>

function updateBrands(){
  const category=document.getElementById("category").value;
  const brand=document.getElementById("brand");
  brand.innerHTML="";
  Object.keys(DATA[category]).forEach(b=>{
    brand.innerHTML+=`<option value="${b}">${b}</option>`;
  });
  updateModels();
}

function updateModels(){
  const category=document.getElementById("category").value;
  const brand=document.getElementById("brand").value;
  const search=document.getElementById("search").value.toLowerCase();
  const model=document.getElementById("model");
  model.innerHTML="";
  const models=DATA[category][brand].filter(m=>m.toLowerCase().includes(search));
  models.forEach(m=>{
    model.innerHTML+=`<option value="${m}">${m}</option>`;
  });
  document.getElementById("count").innerText=models.length+" model gösteriliyor.";
}

function score(condition,brand,category,model){
  let s=55;
  if(condition==="new")s+=30;
  if(condition==="good")s+=20;
  if(condition==="minor")s+=5;
  if(condition==="broken")s-=25;
  if(brand==="Apple")s+=10;
  if(brand==="Samsung")s+=6;
  if(category==="tv")s+=4;
  if(model.includes("Pro")||model.includes("Ultra")||model.includes("OLED"))s+=8;
  return Math.max(5,Math.min(98,s));
}

function analyze(){
  const category=document.getElementById("category").value;
  const brand=document.getElementById("brand").value;
  const model=document.getElementById("model").value;
  const condition=document.getElementById("condition").value;
  const city=document.getElementById("city").value;
  const s=score(condition,brand,category,model);

  let categoryName={
    phone:"Telefon",
    tablet:"Tablet / iPad",
    tv:"Televizyon",
    laptop:"Laptop"
  }[category];

  let advice="";

  if(condition==="new"||condition==="good"){
    advice=`
    <div class="actions">
      <div class="action"><b>💸 Sat</b> Cihaz çalışıyor. Önce ikinci el platformlarda satmayı dene.</div>
      <div class="action"><b>🔧 Tamir / bakım</b> Küçük sorun varsa değerini artırmak için servis fiyatı al.</div>
      <div class="action"><b>🎁 Bağışla</b> Satmak istemezsen çalışan cihazı bağış noktalarına yönlendir.</div>
      <div class="action"><b>♻️ Geri dönüşüm</b> Ekonomik değeri düşükse elektronik atık noktasına ver.</div>
    </div>`;
  }else if(condition==="minor"){
    advice=`
    <div class="actions">
      <div class="action"><b>🔧 Önce tamir fiyatı al</b> Tamir maliyeti düşükse cihazın değeri artabilir.</div>
      <div class="action"><b>💸 Hasarlı sat</b> Kusuru açıkça yazarak parça niyetine satabilirsin.</div>
      <div class="action"><b>♻️ Geri dönüşüm</b> Tamir mantıklı değilse elektronik atık noktasına götür.</div>
      <div class="action"><b>🎁 Bağış</b> Sadece çalışır durumdaysa bağışa uygun olabilir.</div>
    </div>`;
  }else{
    advice=`
    <div class="actions">
      <div class="action"><b>🔧 Kontrol ettir</b> Çalışmasa bile ekran, batarya, anakart veya parça değeri olabilir.</div>
      <div class="action"><b>💸 Parça niyetine sat</b> Tamirci veya ikinci elci parça için alabilir.</div>
      <div class="action"><b>♻️ Elektronik atık</b> Satış ve tamir mantıklı değilse geri dönüşüm en doğru seçenek.</div>
      <div class="action"><b>🎁 Bağış uygun olmayabilir</b> Çalışmayan cihazları çoğu kurum kabul etmeyebilir.</div>
    </div>`;
  }

  const query=encodeURIComponent(brand+" "+model+" ikinci el");
  const repair=encodeURIComponent(categoryName+" tamircisi "+city);
  const recycle=encodeURIComponent("elektronik atık noktası "+city);
  const donate=encodeURIComponent("teknoloji bağış noktası "+city);

  document.getElementById("result").innerHTML=`
    <span class="badge">Skor: ${s}/100</span>
    <h2>${brand} ${model}</h2>
    <p><b>Ürün:</b> ${categoryName}<br>
    <b>Konum:</b> ${city}</p>

    ${advice}

    <a href="https://www.sahibinden.com/arama?query=${query}" target="_blank">Sahibinden'de ara</a>
    <a href="https://www.google.com/search?q=${query}" target="_blank">Google'da ikinci el fiyat ara</a>
    <a href="https://www.google.com/maps/search/${repair}" target="_blank">Yakındaki tamir noktaları</a>
    <a href="https://www.google.com/maps/search/${recycle}" target="_blank">Yakındaki elektronik atık noktaları</a>
    <a href="https://www.google.com/maps/search/${donate}" target="_blank">Yakındaki bağış noktaları</a>
  `;
}

updateBrands();
analyze();
</script>
